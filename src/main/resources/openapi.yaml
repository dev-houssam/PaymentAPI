openapi: 3.0.3

info:
  title: Payment API
  version: 1.0.0
  description: >
    API de paiement permettant de simuler un système bancaire.
    Elle valide les cartes (algorithme de Luhn), débite un compte
    bancaire fictif et enregistre les transactions.
  contact:
    name: Support API - Houssam BACAR
    email: houssam.bacar@etudiant.univ-brest.fr

servers:
  - url: http://localhost:12102
    description: Serveur local Payment API

tags:
  - name: payments
    description: Gestion des paiements

paths:

  /payments:

    get:
      tags:
        - payments
      summary: Liste tous les paiements
      operationId: getAllPayments
      responses:
        "200":
          description: Liste des paiements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentDto"

    post:
      tags:
        - payments
      summary: Effectuer un paiement
      operationId: pay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequestDto"
            example:
              cardNumber: "4532015112830366"
              amount: 50
              description: "Reservation film Matrix"
      responses:
        "200":
          description: Résultat du paiement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponseDto"
        "400":
          description: Requête invalide

  /payments/{id}:

    get:
      tags:
        - payments
      summary: Récupérer un paiement par ID
      operationId: getPayment
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant du paiement
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Paiement trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentDto"
        "404":
          description: Paiement non trouvé

components:

  schemas:

    PaymentDto:
      type: object
      description: Représentation d’un paiement enregistré
      properties:

        id:
          type: integer
          format: int64
          description: Identifiant du paiement
          example: 1

        amount:
          type: integer
          format: int64
          description: Montant du paiement
          example: 50

        currency:
          type: string
          description: Devise utilisée
          example: EUR

        status:
          type: string
          description: Statut du paiement
          example: SUCCESS

        createdAt:
          type: string
          format: date-time
          description: Date de création du paiement
          example: "2026-03-05T14:23:00"

    PaymentRequestDto:
      type: object
      description: Requête pour effectuer un paiement
      required:
        - cardNumber
        - amount
      properties:

        cardNumber:
          type: string
          description: Numéro de carte bancaire
          example: "4532015112830366"

        amount:
          type: integer
          format: int64
          description: Montant à payer
          example: 50

        description:
          type: string
          description: Description du paiement
          example: "Reservation film Matrix"

    PaymentResponseDto:
      type: object
      description: Résultat d’un paiement
      properties:

        success:
          type: boolean
          description: Indique si le paiement a réussi
          example: true

        message:
          type: string
          description: Message retourné par le système de paiement
          example: "Payment successful"

        transactionId:
          type: integer
          format: int64
          description: Identifiant de la transaction bancaire
          example: 10